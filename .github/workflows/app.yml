name: Deploy app

on:
  push:
    branches: [master]
    paths-ignore:
      - 'packages/docs/**'
      - 'openspec/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: app-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENPENCIL_HOSTED_ENV: staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
      url: https://staging.design.elf.dance
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install oxlint
        run: bun add -g oxlint

      - name: Format check
        run: bun run format:check

      - name: Build candidate
        run: bun run build:packages && vite build

      - name: Record staging manifest
        run: bun run release:candidate

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name open-pencil --branch master

      - name: Smoke test staging
        run: |
          sleep 5
          curl -sf https://staging.design.elf.dance >/dev/null

      - name: Upload manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-manifest
          path: .build-manifests/staging.json
          retention-days: 30
