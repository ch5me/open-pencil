name: Preview

on:
  pull_request_target:
    branches: [master]
    paths-ignore:
      - 'packages/docs/**'
      - 'openspec/**'
      - '*.md'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/setup-bun

      - name: Format check
        run: bun run format:check

      - run: bun run build

      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=openpencil-app --branch=${{ github.event.pull_request.head.ref }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const marker = '<!-- preview-deploy -->';
            const body = `${marker}\n🔗 Preview: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body
              });
            }

      - name: Validate preview deploy
        env:
          OPENPENCIL_PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "Waiting for Pages deploy to propagate..."
          DEPLOY_URL="${{ steps.deploy.outputs.deployment-url }}"
          for i in $(seq 1 15); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Preview URL responding with 200"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 3s..."
            sleep 3
          done
          echo "Preview URL did not respond with 200 after 45s"
          exit 1

      - name: Run preview proof (hosted auth + flag validation)
        run: bun run proof:preview
        env:
          OPENPENCIL_PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          OPENPENCIL_PREVIEW_API_ORIGIN: ${{ vars.PREVIEW_API_ORIGIN || 'http://127.0.0.1:8787' }}
