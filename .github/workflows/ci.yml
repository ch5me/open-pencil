name: CI

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - 'packages/docs/**'
      - 'openspec/**'
      - '*.md'
  push:
    branches: [master]
    paths-ignore:
      - 'packages/docs/**'
      - 'openspec/**'
      - '*.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun
        with:
          lfs: 'true'

      - name: Format check
        run: bun run format:check

      - name: Lint & typecheck
        run: bun run check

      - name: Unit tests
        run: bun test tests/engine/
        env:
          BUN_HEAVY_TESTS: 'false'

      - name: Copy-paste detection
        run: bun run test:dupes

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install API dependencies
        working-directory: api
        run: bun install --frozen-lockfile

      - name: API type generation
        working-directory: api
        run: bun run cf-typegen

      - name: API unit tests (auth, crud, assets, room)
        working-directory: api
        run: bun test
        env:
          OPENPENCIL_HOSTED_ENV: preview

  hosted-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install API dependencies
        working-directory: api
        run: bun install --frozen-lockfile

      - name: API type generation
        working-directory: api
        run: bun run cf-typegen

      - name: Start API Worker (preview mode)
        working-directory: api
        run: npx wrangler dev --env preview --port 8787 &
          WRANGLER_PID=$!
          echo "WRANGLER_PID=$WRANGLER_PID" >> $GITHUB_ENV
          echo "Waiting for Worker..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8787/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Worker ready after ${i}s"
              break
            fi
            echo "Attempt $i: status=$STATUS, waiting..."
            sleep 2
          done

      - name: Run hosted proof (flags + API + collab + storage)
        run: bun run proof:all
        env:
          OPENPENCIL_API_ORIGIN: http://127.0.0.1:8787
          OPENPENCIL_HOSTED_ENV: preview
