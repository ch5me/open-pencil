name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA to promote (defaults to latest staging candidate)'
        required: false
        type: string

concurrency:
  group: app-promote-production
  cancel-in-progress: false

env:
  OPENPENCIL_HOSTED_ENV: production

jobs:
  promote-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://design.elf.dance
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Promote candidate to production
        run: bun run promote:production

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name open-pencil --branch master

      - name: Smoke test production
        run: |
          sleep 5
          curl -sf https://design.elf.dance >/dev/null
