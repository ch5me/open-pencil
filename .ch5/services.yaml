version: 1
services:
  api:
    id: openpencil-api
    type: cloudflare-worker
    description: OpenPencil API Worker - auth, documents, AI proxy
    runtime: cloudflare-workers
    health:
      endpoint: https://api.design.elf.dance/health
      fallback: https://api.design.elf.dance/
    environments:
      staging:
        url: https://api.staging.design.elf.dance
        health: https://api.staging.design.elf.dance/
      production:
        url: https://api.design.elf.dance
        health: https://api.design.elf.dance/
    bindings:
      - type: d1
        name: DB
        database: openpencil-db
      - type: r2
        name: DOCUMENTS
        bucket: openpencil-documents
      - type: r2
        name: ASSETS
        bucket: openpencil-assets
      - type: durable-object
        name: DOCUMENT_ROOM
        class: DocumentRoomDO
    owner: ch5
